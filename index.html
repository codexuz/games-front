<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>QuizBlitz — Live Real-Time Quiz Platform</title>
    <meta name="description" content="Host live multiplayer quizzes, challenge friends in 1v1 contests, and compete on global leaderboards. Create, import, or AI-generate quizzes in seconds." />
    <meta name="keywords" content="quiz game, live quiz, multiplayer quiz, real-time quiz, kahoot alternative, quiz platform, online quiz, classroom quiz" />
    <meta name="author" content="QuizBlitz" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://quizblitz.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quizblitz.app/" />
    <meta property="og:title" content="QuizBlitz — Live Real-Time Quiz Platform" />
    <meta property="og:description" content="Host live multiplayer quizzes, challenge friends in 1v1 contests, and compete on global leaderboards." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="QuizBlitz" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="QuizBlitz — Live Real-Time Quiz Platform" />
    <meta name="twitter:description" content="Host live multiplayer quizzes, challenge friends in 1v1 contests, and compete on global leaderboards." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QuizBlitz" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
